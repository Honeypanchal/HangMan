name: flutter_hangman
description: Hangman Game
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.1.3 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  rflutter_alert: ^2.0.7
  material_design_icons_flutter: ^7.0.7296
  sqflite: ^2.3.0
  path: ^1.8.3
  flutter_spinkit: ^5.2.0
  date_format: ^2.0.7
  sqflite_common_ffi:
  change_app_package_name:
  video_player:
  firebase_core:
  firebase_auth:
  firebase_database:
  audioplayers:
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  change_app_package_name:

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - res/
    - assets/audio/Splash_screen.mp4
#  fonts:
#    - family: PatrickHand
#      fonts:
#        - asset: fonts/PatrickHand-Regular.ttf
#    - family: FiraMono
#      fonts:
#        - asset: fonts/FiraMono-Bold.ttf
#        - asset: fonts/FiraMono-Regular.ttf
  fonts:
    - family: PatrickHand
      fonts:
        - asset: assets/fonts/PatrickHand-Regular.ttf
    - family: FiraMono
      fonts:
        - asset: assets/fonts/FiraMono-Bold.ttf
        - asset: assets/fonts/FiraMono-Regular.ttf
    - family: Fredoka
      fonts:
        - asset: assets/fonts/Fredoka-SemiBold.ttf
        - asset: assets/fonts/Fredoka-Regular.ttf
        - asset: assets/fonts/Fredoka-Medium.ttf
    - family: NexaRustExtras
      fonts:
        - asset: assets/fonts/NexaRustExtras-Free.otf

    - family: NexaRustHandmade
      fonts:
        - asset: assets/fonts/NexaRustHandmade-Extended.otf

    - family: NexaRustSans
      fonts:
        - asset: assets/fonts/NexaRustSans-Black.otf

    - family: NexaRustScript
      fonts:
        - asset: assets/fonts/NexaRustScriptL-0.otf

    - family: NexaRustSlab
      fonts:
        - asset: assets/fonts/NexaRustSlab-BlackShadow01.otf

