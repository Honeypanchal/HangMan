name: flutter_hangman
description: Hangman Game
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.1.3 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  rflutter_alert: ^2.0.7
  material_design_icons_flutter: ^7.0.7296
  sqflite: ^2.3.0
  path: ^1.8.3
  flutter_spinkit: ^5.2.0
  date_format: ^2.0.7
  sqflite_common_ffi:
  change_app_package_name:
  video_player:
  firebase_core:
  firebase_auth:
  firebase_database:
  shared_preferences:
  audioplayers:
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  change_app_package_name:
  flutter_launcher_icons:
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/wordscue_icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/images/wordscue_icon.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/images/wordscue_icon.png"


flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - res/
    - assets/audio/Splash_screen.mp4
    - assets/audio/
    - assets/audio/BG_Hangman_Game.mp3
#  fonts:
#    - family: PatrickHand
#      fonts:
#        - asset: fonts/PatrickHand-Regular.ttf
#    - family: FiraMono
#      fonts:
#        - asset: fonts/FiraMono-Bold.ttf
#        - asset: fonts/FiraMono-Regular.ttf
  fonts:
    - family: PatrickHand
      fonts:
        - asset: assets/fonts/PatrickHand-Regular.ttf
    - family: FiraMono
      fonts:
        - asset: assets/fonts/FiraMono-Bold.ttf
        - asset: assets/fonts/FiraMono-Regular.ttf
    - family: Fredoka
      fonts:
        - asset: assets/fonts/Fredoka-SemiBold.ttf
        - asset: assets/fonts/Fredoka-Regular.ttf
        - asset: assets/fonts/Fredoka-Medium.ttf
    - family:  LexendDeca
      fonts:
        - asset: assets/fonts/LexendDeca-Regular.ttf
        - asset: assets/fonts/LexendDeca-Bold.ttf
          weight: 700

    - family: NexaRustExtras
      fonts:
        - asset: assets/fonts/NexaRustExtras-Free.otf

    - family: NexaRustHandmade
      fonts:
        - asset: assets/fonts/NexaRustHandmade-Extended.otf

    - family: NexaRustSans
      fonts:
        - asset: assets/fonts/NexaRustSans-Black.otf

    - family: NexaRustScript
      fonts:
        - asset: assets/fonts/NexaRustScriptL-0.otf

    - family: NexaRustSlab
      fonts:
        - asset: assets/fonts/NexaRustSlab-BlackShadow01.otf



    - family: SFProText
      fonts:
        - asset: assets/fonts/SF-Pro-Text-Bold.otf
        - asset: assets/fonts/SF-Pro-Text-BoldItalic.otf
        - asset: assets/fonts/SF-Pro-Text-Heavy.otf
        - asset: assets/fonts/SF-Pro-Text-HeavyItalic.otf
        - asset: assets/fonts/SF-Pro-Text-Light.otf
        - asset: assets/fonts/SF-Pro-Text-LightItalic.otf
        - asset: assets/fonts/SF-Pro-Text-Medium.otf
        - asset: assets/fonts/SF-Pro-Text-MediumItalic.otf
        - asset: assets/fonts/SF-Pro-Text-Regular.otf
        - asset: assets/fonts/SF-Pro-Text-RegularItalic.otf
        - asset: assets/fonts/SF-Pro-Text-Semibold.otf
        - asset: assets/fonts/SF-Pro-Text-SemiboldItalic.otf

